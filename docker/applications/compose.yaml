name: vocastock-applications

x-api-build: &api-build
  context: ../..

x-api-environment: &api-environment
  VOCAS_SERVICE_HOST: 0.0.0.0
  VOCAS_READINESS_PATH: ${VOCAS_READINESS_PATH:-/readyz}
  RUST_LOG: ${RUST_LOG:-info}
  FIRESTORE_EMULATOR_HOST: ${FIRESTORE_EMULATOR_HOST:-}
  STORAGE_EMULATOR_HOST: ${STORAGE_EMULATOR_HOST:-}
  FIREBASE_AUTH_EMULATOR_HOST: ${FIREBASE_AUTH_EMULATOR_HOST:-}
  PUBSUB_EMULATOR_HOST: ${PUBSUB_EMULATOR_HOST:-}
  FIREBASE_PROJECT: ${VOCAS_FIREBASE_PROJECT:-demo-vocastock}
  VOCAS_PRODUCTION_ADAPTERS: ${VOCAS_PRODUCTION_ADAPTERS:-}
  VOCAS_PUBSUB_TOPIC_EXPLANATION: ${VOCAS_PUBSUB_TOPIC_EXPLANATION:-workflow.explanation-jobs}
  VOCAS_PUBSUB_TOPIC_IMAGE: ${VOCAS_PUBSUB_TOPIC_IMAGE:-workflow.image-jobs}
  VOCAS_PUBSUB_TOPIC_RETRY: ${VOCAS_PUBSUB_TOPIC_RETRY:-workflow.retry-jobs}
  VOCAS_PUBSUB_TOPIC_PURCHASE: ${VOCAS_PUBSUB_TOPIC_PURCHASE:-billing.purchase-jobs}

x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-worker-environment: &worker-environment
  VOCAS_WORKER_STABLE_RUN_SECONDS: ${VOCAS_WORKER_STABLE_RUN_SECONDS:-10}
  VOCAS_WORKER_POLL_INTERVAL_SECONDS: ${VOCAS_WORKER_POLL_INTERVAL_SECONDS:-30}
  RUST_LOG: ${RUST_LOG:-info}
  FIRESTORE_EMULATOR_HOST: ${FIRESTORE_EMULATOR_HOST:-}
  STORAGE_EMULATOR_HOST: ${STORAGE_EMULATOR_HOST:-}
  FIREBASE_AUTH_EMULATOR_HOST: ${FIREBASE_AUTH_EMULATOR_HOST:-}
  PUBSUB_EMULATOR_HOST: ${PUBSUB_EMULATOR_HOST:-}
  FIREBASE_PROJECT: ${VOCAS_FIREBASE_PROJECT:-demo-vocastock}
  VOCAS_PRODUCTION_ADAPTERS: ${VOCAS_PRODUCTION_ADAPTERS:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  STABILITY_API_KEY: ${STABILITY_API_KEY:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}

services:
  graphql-gateway:
    build:
      <<: *api-build
      dockerfile: docker/applications/graphql-gateway/Dockerfile
    <<: *host-gateway
    environment:
      <<: *api-environment
      VOCAS_SERVICE_NAME: graphql-gateway
      VOCAS_SERVICE_PORT: ${GRAPHQL_GATEWAY_PORT:-18180}
      VOCAS_COMMAND_UPSTREAM_BASE_URL: ${VOCAS_COMMAND_UPSTREAM_BASE_URL:-http://command-api:18181}
      VOCAS_QUERY_UPSTREAM_BASE_URL: ${VOCAS_QUERY_UPSTREAM_BASE_URL:-http://query-api:18182}
    ports:
      - "${GRAPHQL_GATEWAY_PORT:-18180}:${GRAPHQL_GATEWAY_PORT:-18180}"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://127.0.0.1:${GRAPHQL_GATEWAY_PORT:-18180}${VOCAS_READINESS_PATH:-/readyz} >/dev/null
      interval: 10s
      timeout: 3s
      retries: 6
    networks:
      - applications

  command-api:
    build:
      <<: *api-build
      dockerfile: docker/applications/command-api/Dockerfile
    <<: *host-gateway
    environment:
      <<: *api-environment
      VOCAS_SERVICE_NAME: command-api
      VOCAS_SERVICE_PORT: ${COMMAND_API_PORT:-18181}
    ports:
      - "${COMMAND_API_PORT:-18181}:${COMMAND_API_PORT:-18181}"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://127.0.0.1:${COMMAND_API_PORT:-18181}${VOCAS_READINESS_PATH:-/readyz} >/dev/null
      interval: 10s
      timeout: 3s
      retries: 6
    networks:
      - applications

  query-api:
    build:
      <<: *api-build
      dockerfile: docker/applications/query-api/Dockerfile
    <<: *host-gateway
    environment:
      <<: *api-environment
      VOCAS_SERVICE_NAME: query-api
      VOCAS_SERVICE_PORT: ${QUERY_API_PORT:-18182}
    ports:
      - "${QUERY_API_PORT:-18182}:${QUERY_API_PORT:-18182}"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://127.0.0.1:${QUERY_API_PORT:-18182}${VOCAS_READINESS_PATH:-/readyz} >/dev/null
      interval: 10s
      timeout: 3s
      retries: 6
    networks:
      - applications

  explanation-worker:
    build:
      context: ../..
      dockerfile: docker/applications/explanation-worker/Dockerfile
    <<: *host-gateway
    environment:
      <<: *worker-environment
      VOCAS_WORKER_NAME: explanation-worker
    networks:
      - applications

  image-worker:
    build:
      context: ../..
      dockerfile: docker/applications/image-worker/Dockerfile
    <<: *host-gateway
    environment:
      <<: *worker-environment
      VOCAS_WORKER_NAME: image-worker
    networks:
      - applications

  billing-worker:
    build:
      context: ../..
      dockerfile: docker/applications/billing-worker/Dockerfile
    <<: *host-gateway
    environment:
      <<: *worker-environment
      VOCAS_WORKER_NAME: billing-worker
    networks:
      - applications

networks:
  applications:
    name: vocastock-applications
