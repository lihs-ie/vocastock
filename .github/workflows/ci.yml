name: ci

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.5"
  NODE_VERSION: "24.14.1"
  JAVA_VERSION: "21"
  LOCAL_HOST_BASELINE: "macOS 26.4.1 / Flutter 3.41.5 / Xcode 26.4 / Android Studio 2025.3 / Docker Desktop 4.69.0"

jobs:
  toolchain-validate:
    name: toolchain-validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print local-versus-runner boundary
        run: |
          echo "Local host baseline: ${LOCAL_HOST_BASELINE}"
          echo "Linux CI runner: ubuntu-24.04"
      - name: Install and verify toolchains
        run: bash scripts/ci/install_toolchains.sh
      - name: Validate version catalog
        run: bash scripts/ci/check_version_catalog.sh

  flutter-static-checks:
    name: flutter-static-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install and verify toolchains
        run: bash scripts/ci/install_toolchains.sh
      - name: Run Flutter quality checks
        run: bash scripts/ci/run_quality_checks.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-flutter-static-checks
          path: .artifacts/ci
          if-no-files-found: ignore

  emulator-smoke:
    name: emulator-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Dockerized Firebase emulator smoke
        run: bash scripts/ci/run_emulator_smoke.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-emulator-smoke
          path: .artifacts/ci
          if-no-files-found: ignore

  no-mocks-in-production:
    name: no-mocks-in-production
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Guard production code paths
        run: bash scripts/ci/verify_no_mock_in_production.sh

  application-container-smoke:
    name: application-container-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Validate application container contract
        run: bash scripts/bootstrap/validate_application_containers.sh
      - name: Run application container smoke
        run: bash scripts/ci/run_application_container_smoke.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-application-container-smoke
          path: .artifacts/ci
          if-no-files-found: ignore

  e2e-round-trip-smoke:
    name: e2e-round-trip-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Run E2E command -> worker -> query round-trip smoke
        run: bash scripts/ci/run_e2e_round_trip_smoke.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-e2e-round-trip-smoke
          path: .artifacts/ci
          if-no-files-found: ignore

  rust-quality:
    name: rust-quality
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect Rust quality execution mode
        id: rust-changes
        env:
          VOCAS_RUST_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          VOCAS_RUST_HEAD_SHA: ${{ github.sha }}
        run: bash scripts/ci/detect_rust_changes.sh --base "${VOCAS_RUST_BASE_SHA}" --head "${VOCAS_RUST_HEAD_SHA}"
      - name: Install and verify toolchains
        if: ${{ steps.rust-changes.outputs.execution_mode == 'full' }}
        run: bash scripts/ci/install_toolchains.sh
      - name: Run Rust quality checks
        run: bash scripts/ci/run_rust_quality_checks.sh --mode "${{ steps.rust-changes.outputs.execution_mode }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-rust-quality
          path: .artifacts/ci
          if-no-files-found: ignore

  haskell-quality:
    name: haskell-quality
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: '9.2.8'
          cabal-version: '3.14.2.0'
      - name: Cache cabal store
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            dist-newstyle
          key: haskell-${{ runner.os }}-ghc9.2.8-${{ hashFiles('cabal.project', '**/*.cabal') }}
          restore-keys: |
            haskell-${{ runner.os }}-ghc9.2.8-
      - name: cabal update
        run: cabal update
      - name: cabal build (workspace)
        run: cabal build all
      - name: cabal test (unit suites)
        run: |
          cabal test vocas-worker-core:unit \
                     explanation-worker:unit \
                     image-worker:unit \
                     billing-worker:unit \
                     --test-show-details=direct

  android-build-smoke:
    name: android-build-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: toolchain-validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install and verify toolchains
        run: bash scripts/ci/install_toolchains.sh
      - name: Run Android build smoke
        run: bash scripts/ci/run_android_build_smoke.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-android-build-smoke
          path: .artifacts/ci
          if-no-files-found: ignore

  vulnerability-scan:
    name: vulnerability-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: toolchain-validate
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate Trivy policy
        run: bash scripts/ci/run_quality_checks.sh --validate-trivy-policy
      - name: Mark vulnerability scan start
        run: |
          mkdir -p .artifacts/ci/durations .artifacts/ci/logs
          date +%s > .artifacts/ci/durations/vulnerability-scan.started-at
      - name: Run Trivy filesystem scan
        run: bash scripts/ci/run_vulnerability_scan.sh
      - name: Record vulnerability scan duration
        if: ${{ success() || failure() }}
        run: |
          start_epoch="$(cat .artifacts/ci/durations/vulnerability-scan.started-at)"
          end_epoch="$(date +%s)"
          printf "%s\n" "$((end_epoch - start_epoch))" > .artifacts/ci/durations/vulnerability-scan.seconds
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-vulnerability-scan
          path: .artifacts/ci
          if-no-files-found: ignore

  ci-runtime-budget:
    name: ci-runtime-budget
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - flutter-static-checks
      - emulator-smoke
      - application-container-smoke
      - e2e-round-trip-smoke
      - no-mocks-in-production
      - rust-quality
      - haskell-quality
      - android-build-smoke
      - vulnerability-scan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ci-metrics-*
          path: .artifacts/downloaded
          merge-multiple: true
      - name: Enforce Linux CI runtime budget
        run: bash scripts/ci/check_ci_runtime_budget.sh .artifacts/downloaded
