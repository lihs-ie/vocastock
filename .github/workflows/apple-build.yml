name: apple-build

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.5"
  NODE_VERSION: "24.14.1"
  JAVA_VERSION: "21"
  LOCAL_HOST_BASELINE: "macOS 26.4.1 / Flutter 3.41.5 / Xcode 26.4 / Android Studio 2025.3 / Docker Desktop 4.69.0"

jobs:
  apple-build-smoke:
    name: apple-build-smoke
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Print local-versus-runner boundary
        run: |
          echo "Local host baseline: ${LOCAL_HOST_BASELINE}"
          echo "Apple CI runner: macos-15"
      - name: Install and verify toolchains
        run: bash scripts/ci/install_toolchains.sh
      - name: Run Apple build smoke
        run: bash scripts/ci/run_apple_build_smoke.sh
      - name: Enforce Apple workflow runtime budget
        run: bash scripts/ci/check_ci_runtime_budget.sh .artifacts/ci
      - uses: actions/upload-artifact@v4
        if: ${{ success() || failure() }}
        with:
          name: ci-metrics-apple-build-smoke
          path: .artifacts/ci
          if-no-files-found: ignore
