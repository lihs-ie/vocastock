name: emulator-image-prepare

on:
  push:
    branches:
      - main
      - develop
    paths:
      - docker/firebase/Dockerfile
      - docker/firebase/compose.yaml
      - firebase.json
      - scripts/lib/vocastock_env.sh
      - scripts/ci/prepare_emulator_image.sh
      - scripts/ci/resolve_emulator_image_ref.sh
      - .github/workflows/emulator-image-prepare.yml
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Force image rebuild even when the baseline already exists
        required: false
        type: boolean
        default: false
      export_artifact:
        description: Export a same-run image artifact
        required: false
        type: boolean
        default: false
      allow_publish:
        description: Publish the prepared image to GHCR
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: prepare-emulator-image
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        if: ${{ github.token != '' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Prepare reusable emulator image
        id: prepare
        env:
          VOCAS_STAGE_NAMESPACE: emulator-image-prepare
          VOCAS_GHCR_TOKEN: ${{ github.token }}
          VOCAS_GHCR_USERNAME: ${{ github.actor }}
          INPUT_ALLOW_PUBLISH: ${{ inputs.allow_publish }}
          INPUT_EXPORT_ARTIFACT: ${{ inputs.export_artifact }}
          INPUT_FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          allow_publish="${INPUT_ALLOW_PUBLISH:-}"
          export_artifact="${INPUT_EXPORT_ARTIFACT:-}"
          force_rebuild="${INPUT_FORCE_REBUILD:-}"

          if [[ -z "$allow_publish" ]]; then
            allow_publish=1
          fi
          if [[ -z "$export_artifact" ]]; then
            export_artifact=0
          fi
          if [[ -z "$force_rebuild" ]]; then
            force_rebuild=0
          fi

          if [[ "$allow_publish" == "true" ]]; then
            export VOCAS_IMAGE_PREPARE_ALLOW_PUBLISH=1
          else
            export VOCAS_IMAGE_PREPARE_ALLOW_PUBLISH=0
          fi

          if [[ "$export_artifact" == "true" ]]; then
            export VOCAS_IMAGE_PREPARE_EXPORT_ARTIFACT=1
          else
            export VOCAS_IMAGE_PREPARE_EXPORT_ARTIFACT=0
          fi

          if [[ "$force_rebuild" == "true" ]]; then
            export VOCAS_IMAGE_PREPARE_FORCE_REBUILD=1
          else
            export VOCAS_IMAGE_PREPARE_FORCE_REBUILD=0
          fi

          bash scripts/ci/prepare_emulator_image.sh
      - name: Upload prepared image artifact
        if: ${{ steps.prepare.outputs.image_artifact_name != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.prepare.outputs.image_artifact_name }}
          path: .artifacts/ci/images/${{ steps.prepare.outputs.image_artifact_file }}
          if-no-files-found: error
      - name: Upload emulator image diagnostics
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-metrics-emulator-image-prepare
          path: |
            .artifacts/ci
            .artifacts/firebase
          if-no-files-found: ignore
